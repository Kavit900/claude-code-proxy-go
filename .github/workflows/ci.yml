name: CI - Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Get dependencies
      run: |
        go mod tidy
        go mod download

    - name: Build binary
      env:
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
      run: |
        suffix=""
        output_name="claude-code-proxy-go-${{ matrix.os }}-${{ matrix.arch }}${suffix}"
        go build -ldflags="-s -w" -o $output_name ./cmd/server

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: claude-code-proxy-go-${{ matrix.os }}-${{ matrix.arch }}
        path: claude-code-proxy-go-*
        retention-days: 7

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Get dependencies
      run: |
        go mod tidy
        go mod download

    - name: Run tests
      run: go test -v ./...

    - name: Run vet
      run: go vet ./...
